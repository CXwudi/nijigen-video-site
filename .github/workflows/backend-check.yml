name: 'Backend Check'

on:
  pull_request:
    paths:
      - '.github/workflows/backend-check.yml'
      - 'backend/**'
      - 'infra/compose/**'
      - 'infra/flyway/**'
      - 'mise.toml'
      - 'backend/docker/mise.toml'
  push:
    paths:
      - '.github/workflows/backend-check.yml'
      - 'backend/**'
      - 'infra/compose/**'
      - 'infra/flyway/**'
      - 'mise.toml'
      - 'backend/docker/mise.toml'
    branches:
      - 'main'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  check-backend:
    name: 'Check Backend'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 75
    permissions:
      contents: 'read'
    env:
      DOCKERHUB_USERNAME: '${{ secrets.DOCKERHUB_USERNAME }}'
      DOCKERHUB_TOKEN: '${{ secrets.DOCKERHUB_TOKEN }}'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v6'

      - name: 'Install mise'
        uses: 'jdx/mise-action@v4'
        with:
          experimental: true
          install: true
          cache: true

      - name: 'Set up Gradle cache and build scans'
        uses: 'gradle/actions/setup-gradle@v6'
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'

      - name: 'Validate Docker Hub credentials'
        run: |
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::error::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets must be configured."
            exit 1
          fi

      - name: 'Login to Docker Hub'
        uses: 'docker/login-action@v3'
        with:
          username: '${{ env.DOCKERHUB_USERNAME }}'
          password: '${{ env.DOCKERHUB_TOKEN }}'

      - name: 'Prepare Compose env file'
        run: 'cp backend/docker/.env.example backend/docker/.env'

      - name: 'Render backend Compose stack'
        run: 'mise //backend/docker:config-check'

      - name: 'Run api test'
        run: 'mise //backend/docker:run --rm api :apps:api:test'

      # Unsure if we should enable running any time-consuming native compilation or native test in CI

      # - name: 'Run api nativeCompile'
      #   run: 'mise //backend/docker:run --rm api :apps:api:nativeCompile'

      # - name: 'Run api nativeTest'
      #   run: 'mise //backend/docker:run --rm api :apps:api:nativeTest'

      - name: 'Clean backend Compose stack'
        if: 'always()'
        run: 'mise //backend/docker:down'

      - name: 'Upload api build reports'
        uses: 'actions/upload-artifact@v7'
        if: 'always()'
        with:
          name: 'api-build-reports'
          path: 'backend/apps/api/build/reports/'
