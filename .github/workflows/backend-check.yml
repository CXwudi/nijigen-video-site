name: 'Backend Check'

on:
  pull_request:
    paths:
      - '.github/workflows/backend-check.yml'
      - 'backend/**'
      - 'infra/compose/**'
      - 'infra/flyway/**'
      - 'justfile'
  push:
    paths:
      - '.github/workflows/backend-check.yml'
      - 'backend/**'
      - 'infra/compose/**'
      - 'infra/flyway/**'
      - 'justfile'
    branches:
      - 'main'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'
    working-directory: 'backend/docker'

jobs:
  check-backend:
    name: 'Check Backend'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 75
    permissions:
      contents: 'read'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v6'

      - name: 'Install just'
        uses: 'taiki-e/install-action@just'

      - name: 'Set up Gradle cache and build scans'
        uses: 'gradle/actions/setup-gradle@v6'
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'

      - name: 'Login to Docker Hub'
        uses: 'docker/login-action@v3'
        with:
          username: '${{ secrets.DOCKERHUB_USERNAME }}'
          password: '${{ secrets.DOCKERHUB_TOKEN }}'

      - name: 'Prepare Compose env file'
        run: 'cp .env.example .env'

      - name: 'Render backend Compose stack'
        run: 'just config-check'

      - name: 'Run api test'
        run: 'just run --rm api :apps:api:test'

      # Unsure if we should enable running any time-consuming native compilation or native test in CI

      # - name: 'Run api nativeCompile'
      #   run: 'just run --rm api :apps:api:nativeCompile'

      # - name: 'Run api nativeTest'
      #   run: 'just run --rm api :apps:api:nativeTest'

      - name: 'Clean backend Compose stack'
        if: 'always()'
        run: 'just down'

      - name: 'Upload api build reports'
        uses: 'actions/upload-artifact@v7'
        if: 'always()'
        with:
          name: 'api-build-reports'
          path: 'backend/apps/api/build/reports/'
