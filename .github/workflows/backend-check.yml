name: 'Backend Check'

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

defaults:
  run:
    shell: 'bash'

jobs:
  check-backend:
    name: 'Check Backend'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 75
    permissions:
      contents: 'read'
    env:
      DOCKERHUB_USERNAME: '${{ secrets.DOCKERHUB_USERNAME }}'
      DOCKERHUB_TOKEN: '${{ secrets.DOCKERHUB_TOKEN }}'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1' # v7.0.1
        with:
          persist-credentials: false

      - name: 'Install mise'
        uses: 'jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea' # v4.2.1
        with:
          experimental: true
          install: true
          cache: true

      - name: 'Set up Gradle cache and build scans'
        uses: 'gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92' # v6.2.0
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'

      - name: 'Validate Docker Hub credentials'
        run: |
          if [[ -z "${DOCKERHUB_USERNAME}" && -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::notice::Docker Hub credentials are unavailable; skipping login."
            exit 0
          fi
          # A partial pair cannot authenticate and indicates a configuration error.
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::error::Both DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must be configured when either is set."
            exit 1
          fi

      - name: 'Login to Docker Hub'
        if: "${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}"
        uses: 'docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0' # v4.4.0
        with:
          username: '${{ env.DOCKERHUB_USERNAME }}'
          password: '${{ env.DOCKERHUB_TOKEN }}'

      - name: 'Prepare Compose env file'
        run: 'cp backend/docker/.env.example backend/docker/.env'

      - name: 'Render backend Compose stack'
        run: 'mise //backend/docker:config-check'

      - name: 'Run api test'
        run: 'mise //backend/docker:run --rm api :apps:api:test'

      # Unsure if we should enable running any time-consuming native compilation or native test in CI

      # - name: 'Run api nativeCompile'
      #   run: 'mise //backend/docker:run --rm api :apps:api:nativeCompile'

      # - name: 'Run api nativeTest'
      #   run: 'mise //backend/docker:run --rm api :apps:api:nativeTest'

      - name: 'Clean backend Compose stack'
        if: 'always()'
        run: 'mise //backend/docker:down'

      - name: 'Upload api build reports'
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a' # v7.0.1
        if: 'always()'
        with:
          name: 'api-build-reports'
          path: 'backend/apps/api/build/reports/'
