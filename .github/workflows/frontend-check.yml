name: 'Frontend Check'

on:
  pull_request:
    paths:
      - '.github/workflows/frontend-check.yml'
      - 'frontend/**'
      - 'infra/compose/**'
      - 'infra/flyway/**'
      - 'mise.toml'
  push:
    paths:
      - '.github/workflows/frontend-check.yml'
      - 'frontend/**'
      - 'infra/compose/**'
      - 'infra/flyway/**'
      - 'mise.toml'
    branches:
      - 'main'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  check-frontend:
    name: 'Check Frontend'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 75
    permissions:
      contents: 'read'
    env:
      DOCKERHUB_USERNAME: '${{ secrets.DOCKERHUB_USERNAME }}'
      DOCKERHUB_TOKEN: '${{ secrets.DOCKERHUB_TOKEN }}'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v6'
        with:
          persist-credentials: false

      - name: 'Install mise'
        uses: 'jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d'
        with:
          experimental: true
          install: true
          cache: false # code rabbit says this one can get runtime-artifact-poisoning risk (cache populated by potentially untrusted PR runs could later be consumed by trusted runs)

      - name: 'Set up Docker Buildx'
        uses: 'docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f'

      - name: 'Validate Docker Hub credentials'
        run: |
          if [[ -z "${DOCKERHUB_USERNAME}" && -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::notice::Docker Hub credentials are unavailable; skipping login."
            exit 0
          fi
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::error::Both DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must be configured when either is set."
            exit 1
          fi

      - name: 'Login to Docker Hub'
        if: "${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}"
        uses: 'docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9'
        with:
          username: '${{ env.DOCKERHUB_USERNAME }}'
          password: '${{ env.DOCKERHUB_TOKEN }}'

      - name: 'Prepare Compose env file'
        run: 'cp frontend/docker/.env.example frontend/docker/.env'

      - name: 'Render frontend Compose stack'
        run: 'mise //frontend/docker:config-check'

      - name: 'Resolve frontend runtime versions'
        id: 'runtime_versions'
        run: |
          node_version="$(mise exec -- printenv NODE_VERSION)"
          pnpm_version="$(mise exec -- printenv PNPM_VERSION)"
          if [[ -z "${node_version}" || -z "${pnpm_version}" ]]; then
            echo '::error::NODE_VERSION and PNPM_VERSION must resolve through mise.'
            exit 1
          fi
          {
            echo "node_version=${node_version}"
            echo "pnpm_version=${pnpm_version}"
          } >> "${GITHUB_OUTPUT}"

      - name: 'Build frontend pnpm image'
        uses: 'docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8'
        with:
          context: 'frontend'
          file: 'frontend/docker/Dockerfile'
          target: 'web-pnpm-base'
          tags: 'nijigen-video-site-web-pnpm:local'
          load: true
          build-args: |
            NODE_VERSION=${{ steps.runtime_versions.outputs.node_version }}
            PNPM_VERSION=${{ steps.runtime_versions.outputs.pnpm_version }}
          cache-from: 'type=gha,scope=frontend-web'
          cache-to: 'type=gha,scope=frontend-web,mode=max'

      - name: 'Initialize frontend dependency volumes'
        run: 'mise //frontend/docker:run --rm --no-deps web-init'

      - name: 'Run web format check'
        run: 'mise //frontend/docker:run --rm --no-deps web --filter web format:check'

      - name: 'Run web lint'
        run: 'mise //frontend/docker:run --rm --no-deps web --filter web lint'

      - name: 'Run web typecheck'
        run: 'mise //frontend/docker:run --rm --no-deps web --filter web typecheck'

      # Tests may require backend stack services to be available.
      - name: 'Run web test'
        run: 'mise //frontend/docker:run --rm web --filter web test'

      - name: 'Run web build'
        run: 'mise //frontend/docker:run --rm --no-deps web --filter web build'

      - name: 'Clean frontend Compose stack'
        if: 'always()'
        run: 'mise //frontend/docker:down'
