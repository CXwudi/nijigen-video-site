name: 'Frontend Check'

on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

defaults:
  run:
    shell: 'bash'

jobs:
  check-frontend:
    name: 'Check Frontend'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 75
    permissions:
      contents: 'read'
    env:
      DOCKERHUB_USERNAME: '${{ secrets.DOCKERHUB_USERNAME }}'
      DOCKERHUB_TOKEN: '${{ secrets.DOCKERHUB_TOKEN }}'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # v7.0.0
        with:
          persist-credentials: false

      - name: 'Install mise'
        uses: 'jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea' # v4.2.1
        with:
          experimental: true
          install: true
          cache: true

      - name: 'Set up Docker Buildx'
        uses: 'docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c' # v4.2.0

      - name: 'Validate Docker Hub credentials'
        run: |
          if [[ -z "${DOCKERHUB_USERNAME}" && -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::notice::Docker Hub credentials are unavailable; skipping login."
            exit 0
          fi
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "::error::Both DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must be configured when either is set."
            exit 1
          fi

      - name: 'Login to Docker Hub'
        if: "${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}"
        uses: 'docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0' # v4.4.0
        with:
          username: '${{ env.DOCKERHUB_USERNAME }}'
          password: '${{ env.DOCKERHUB_TOKEN }}'

      - name: 'Prepare Compose env file'
        run: 'cp frontend/docker/.env.example frontend/docker/.env'

      - name: 'Render frontend Compose stack'
        run: 'mise //frontend/docker:config-check'

      - name: 'Resolve frontend runtime versions'
        id: 'runtime_versions'
        run: |
          node_version="$(mise exec -- printenv NODE_VERSION)"
          pnpm_version="$(mise exec -- printenv PNPM_VERSION)"
          if [[ -z "${node_version}" || -z "${pnpm_version}" ]]; then
            echo '::error::NODE_VERSION and PNPM_VERSION must resolve through mise.'
            exit 1
          fi
          {
            echo "node_version=${node_version}"
            echo "pnpm_version=${pnpm_version}"
          } >> "${GITHUB_OUTPUT}"

      - name: 'Resolve BuildKit cache scope'
        id: 'buildkit_cache'
        env:
          EVENT_NAME: '${{ github.event_name }}'
          PR_NUMBER: '${{ github.event.pull_request.number }}'
          REF: '${{ github.ref }}'
          REF_NAME: '${{ github.ref_name }}'
        run: |
          case "${EVENT_NAME}" in
            pull_request)
              # PR caches are merge-ref isolated. Restore this PR first, then
              # use the trusted main cache as a read-only fallback.
              scope="frontend-web-pr-${PR_NUMBER}"
              cache_from="type=gha,scope=${scope}
          type=gha,scope=frontend-web-main"
              ;;
            push)
              # Only a push to main may update the trusted main cache. Keep
              # this check even if the workflow trigger is widened later.
              if [[ "${REF}" != 'refs/heads/main' ]]; then
                echo "::error::Push cache writes are restricted to refs/heads/main."
                exit 1
              fi
              scope='frontend-web-main'
              cache_from="type=gha,scope=${scope}"
              ;;
            workflow_dispatch)
              # Manual runs use a branch-local scope. Remove BuildKit CSV
              # delimiter characters before embedding the branch in scope=.
              safe_ref_name="$(printf '%s' "${REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
              scope="frontend-web-manual-${safe_ref_name}"
              cache_from="type=gha,scope=${scope}
          type=gha,scope=frontend-web-main"
              ;;
            *)
              # Unsupported event type. 
              echo "::error::Unsupported event type: ${EVENT_NAME}"
              exit 1
              ;;
          esac
          {
            echo "scope=${scope}"
            echo 'cache_from<<EOF'
            echo "${cache_from}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: 'Build frontend pnpm image'
        uses: 'docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a' # v7.3.0
        with:
          context: 'frontend'
          file: 'frontend/docker/Dockerfile'
          target: 'web-pnpm-base'
          tags: 'nijigen-video-site-web-pnpm:local'
          load: true
          push: false
          build-args: |
            NODE_VERSION=${{ steps.runtime_versions.outputs.node_version }}
            PNPM_VERSION=${{ steps.runtime_versions.outputs.pnpm_version }}
          cache-from: '${{ steps.buildkit_cache.outputs.cache_from }}'
          cache-to: 'type=gha,scope=${{ steps.buildkit_cache.outputs.scope }},mode=max'

      - name: 'Initialize frontend dependency volumes'
        run: 'mise //frontend/docker:run --rm --no-deps web-init'

      - name: 'Run web format check'
        run: 'mise //frontend/docker:run --rm --no-deps web --filter web format:check'

      - name: 'Run web lint'
        run: 'mise //frontend/docker:run --rm --no-deps web --filter web lint'

      - name: 'Run web typecheck'
        run: 'mise //frontend/docker:run --rm --no-deps web --filter web typecheck'

      # Tests may require backend stack services to be available.
      - name: 'Run web test'
        run: 'mise //frontend/docker:run --rm web --filter web test'

      - name: 'Run web build'
        run: 'mise //frontend/docker:run --rm --no-deps web --filter web build'

      - name: 'Clean frontend Compose stack'
        if: 'always()'
        run: 'mise //frontend/docker:down'
