name: 'Backend Verification'

on:
  pull_request:
    paths:
      - '.dockerignore'
      - '.github/workflows/backend-verify.yml'
      - 'backend/**'
      - 'infra/compose/**'
      - 'infra/flyway/**'
  push:
    paths:
      - '.dockerignore'
      - '.github/workflows/backend-verify.yml'
      - 'backend/**'
      - 'infra/compose/**'
      - 'infra/flyway/**'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'
    working-directory: 'infra/compose'

jobs:
  verify-backend:
    name: 'Verify Backend'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 75
    permissions:
      contents: 'read'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v6'

      - name: 'Install just'
        uses: 'taiki-e/install-action@just'

      - name: 'Set up Gradle cache'
        uses: 'gradle/actions/setup-gradle@v6'

      - name: 'Prepare Compose env file'
        run: 'cp .env.example .env'

      - name: 'Render CI Compose stack'
        run: 'just check-config ci'

      - name: 'Run JVM verification lane'
        run: 'just verify-jvm'

      - name: 'Run native verification lane'
        run: 'just verify-native all'
