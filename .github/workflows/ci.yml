name: 'CI'

on:
  pull_request:
  push:
    branches:
      - 'main'
  workflow_dispatch:

permissions: {}

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  detect-changes:
    name: 'Detect Changed Paths'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    permissions:
      contents: 'read'
      pull-requests: 'read'
    outputs:
      backend: '${{ steps.paths.outputs.backend || steps.manual.outputs.backend }}'
      frontend: '${{ steps.paths.outputs.frontend || steps.manual.outputs.frontend }}'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1' # v7.0.1
        with:
          persist-credentials: false

      - name: 'Select components from changed paths'
        id: 'paths'
        if: "github.event_name != 'workflow_dispatch'"
        uses: 'dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706' # v4.0.2
        with:
          filters: |
            backend:
              - '.github/workflows/ci.yml'
              - '.github/workflows/backend-check.yml'
              - 'backend/**'
              - 'infra/compose/**'
              - 'infra/flyway/**'
              - 'mise.toml'
              - 'backend/docker/mise.toml'
            frontend:
              - '.github/workflows/ci.yml'
              - '.github/workflows/frontend-check.yml'
              - 'frontend/**'
              - 'infra/compose/**'
              - 'infra/flyway/**'
              - 'mise.toml'

      - name: 'Select all components for a manual run'
        id: 'manual'
        if: "github.event_name == 'workflow_dispatch'"
        run: |
          echo 'backend=true' >> "${GITHUB_OUTPUT}"
          echo 'frontend=true' >> "${GITHUB_OUTPUT}"

  actions-security:
    name: 'Actions Security'
    uses: './.github/workflows/actions-security-check.yml'
    permissions:
      contents: 'read'

  docs-links:
    name: 'Documentation Links'
    uses: './.github/workflows/docs-link-check.yml'
    permissions:
      contents: 'read'

  backend:
    name: 'Backend'
    needs:
      - 'detect-changes'
    if: "needs.detect-changes.outputs.backend == 'true'"
    uses: './.github/workflows/backend-check.yml'
    permissions:
      contents: 'read'
    secrets:
      DOCKERHUB_USERNAME: '${{ secrets.DOCKERHUB_USERNAME }}'
      DOCKERHUB_TOKEN: '${{ secrets.DOCKERHUB_TOKEN }}'

  frontend:
    name: 'Frontend'
    needs:
      - 'detect-changes'
    if: "needs.detect-changes.outputs.frontend == 'true'"
    uses: './.github/workflows/frontend-check.yml'
    permissions:
      contents: 'read'
    secrets:
      DOCKERHUB_USERNAME: '${{ secrets.DOCKERHUB_USERNAME }}'
      DOCKERHUB_TOKEN: '${{ secrets.DOCKERHUB_TOKEN }}'

  ci-gate:
    name: 'CI Gate'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    permissions: {}
    if: 'always()'
    needs:
      - 'detect-changes'
      - 'actions-security'
      - 'docs-links'
      - 'backend'
      - 'frontend'
    env:
      DETECT_CHANGES_RESULT: '${{ needs.detect-changes.result }}'
      ACTIONS_SECURITY_RESULT: '${{ needs.actions-security.result }}'
      DOCS_LINKS_RESULT: '${{ needs.docs-links.result }}'
      BACKEND_SELECTED: '${{ needs.detect-changes.outputs.backend }}'
      BACKEND_RESULT: '${{ needs.backend.result }}'
      FRONTEND_SELECTED: '${{ needs.detect-changes.outputs.frontend }}'
      FRONTEND_RESULT: '${{ needs.frontend.result }}'
    steps:
      - name: 'Evaluate CI results'
        run: |
          # Require an unconditional dependency to succeed.
          check_required() {
            local check_name="$1"
            local result="$2"
            if [[ "${result}" != 'success' ]]; then
              echo "::error::${check_name} result was ${result}; expected success."
              return 1
            fi
          }

          # Require a selected component to succeed and an unselected one to skip.
          check_component() {
            local check_name="$1"
            local selected="$2"
            local result="$3"
            if [[ "${selected}:${result}" != 'true:success' && "${selected}:${result}" != 'false:skipped' ]]; then
              echo "::error::${check_name} selection/result was ${selected:-missing}/${result}; expected true/success or false/skipped."
              return 1
            fi
          }

          gate_status=0
          check_required 'Change detection' "${DETECT_CHANGES_RESULT}" || gate_status=1
          check_required 'Actions security' "${ACTIONS_SECURITY_RESULT}" || gate_status=1
          check_required 'Documentation links' "${DOCS_LINKS_RESULT}" || gate_status=1
          check_component 'Backend' "${BACKEND_SELECTED}" "${BACKEND_RESULT}" || gate_status=1
          check_component 'Frontend' "${FRONTEND_SELECTED}" "${FRONTEND_RESULT}" || gate_status=1
          exit "${gate_status}"
