# Profile used when connecting to external services via port forwarding in Compose files.
# Backend local Docker defaults live in backend/docker/.env.

spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_HOST_PORT:-5432}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  redis:
    host: localhost
    port: ${REDIS_HOST_PORT:-6379}
