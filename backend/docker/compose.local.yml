# Backend local Docker Compose stack.

name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site-backend}

services:
  api:
    extends:
      file: ../../infra/compose/common-services.yml
      service: api-compose-base
    image: ghcr.io/bell-sw/hardened-liberica-native-image-kit-container:jdk-${JDK_VERSION:-25}-nik-${JDK_VERSION:-25}-glibc
    working_dir: /workspace/backend
    user: "${HOST_UID:-0}:${HOST_GID:-0}"
    profiles:
      - backend
    environment:
      GRADLE_USER_HOME: /gradle-home
      CI: ${CI:-}
    entrypoint:
      - ./gradlew
      - --no-daemon
    command:
      - :apps:api:bootRun
    ports:
      - ${API_HTTP_PORT:-8080}:8080
    volumes:
      - ..:/workspace/backend
      - ${HOST_GRADLE_USER_HOME:-${HOME}/.gradle}:/gradle-home
    restart: "no"

  api-jb:
    extends:
      file: ../../infra/compose/common-services.yml
      service: api-compose-base
    image: ghcr.io/bell-sw/hardened-liberica-native-image-kit-container:jdk-${JDK_VERSION:-25}-nik-${JDK_VERSION:-25}-glibc
    working_dir: /workspace/backend
    profiles:
      - jetbrains
    command:
      - sleep
      - infinity
    ports:
      - ${API_HTTP_PORT:-8080}:8080
    volumes:
      - ..:/workspace/backend
    restart: "no"

  postgres:
    extends:
      file: ../../infra/compose/common-services.yml
      service: postgres-base
    ports:
      - ${POSTGRES_HOST_PORT:-5432}:5432

  redis:
    extends:
      file: ../../infra/compose/common-services.yml
      service: redis-base
    ports:
      - ${REDIS_HOST_PORT:-6379}:6379

  flyway:
    extends:
      file: ../../infra/compose/common-services.yml
      service: flyway-base
    environment:
      FLYWAY_LOCATIONS: filesystem:/flyway/sql/baseline,filesystem:/flyway/sql/local
    volumes:
      - ../../infra/flyway/sql/baseline:/flyway/sql/baseline:ro
      - ../../infra/flyway/sql/local:/flyway/sql/local:ro

networks:
  app:

volumes:
  postgres-data:
  redis-data:
