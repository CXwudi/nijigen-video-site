# Shared Docker Compose service bases for nijigen-video-site.
#
# Concrete Compose files own their stack entrypoints and top-level resources.
# These bases only hold settings that are genuinely shared across stacks.

x-shared-spring-env: &shared-spring-env
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nijigen_video_site}
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"

services:
  api-compose-base:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    environment:
      SPRING_APPLICATION_NAME: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-${API_APPLICATION_NAME:-apps-api}
      <<: *shared-spring-env
    networks:
      - app

  api-gradle-base:
    extends:
      service: api-compose-base
    image: ghcr.io/bell-sw/hardened-liberica-native-image-kit-container:jdk-${JDK_VERSION:-25}-nik-${JDK_VERSION:-25}-glibc
    working_dir: /workspace/backend
    user: "${HOST_UID:-0}:${HOST_GID:-0}"
    environment:
      GRADLE_USER_HOME: /gradle-home
      CI: ${CI:-}
    entrypoint:
      - ./gradlew
      - --no-daemon
    command:
      - :apps:api:bootRun
    restart: "no"
    volumes:
      - ../../backend:/workspace/backend
      - ${HOST_GRADLE_USER_HOME:-${HOME}/.gradle}:/gradle-home

  postgres-base:
    image: postgres:${POSTGRES_VERSION:-17}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - app
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis-base:
    image: redis:${REDIS_VERSION:-8}
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - app
    restart: unless-stopped
    volumes:
      - redis-data:/data

  flyway-base:
    image: flyway/flyway:${FLYWAY_VERSION:-11}
    command:
      - migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nijigen_video_site}
      FLYWAY_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      FLYWAY_CONNECT_RETRIES: "60"
      FLYWAY_LOCATIONS: filesystem:/flyway/sql/baseline
    networks:
      - app
    restart: "no"
    volumes:
      - ../flyway/sql/baseline:/flyway/sql/baseline:ro
