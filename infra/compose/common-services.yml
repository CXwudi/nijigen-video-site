# Shared Docker Compose service bases for nijigen-video-site.
#
# Concrete Compose files own their stack entrypoints and top-level resources.
# These bases only hold settings that are genuinely shared across stacks.

x-shared-spring-env: &shared-spring-env
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nijigen_video_site}
  SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nijigen}
  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nijigen}
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"

services:
  api-compose-base:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    environment:
      SPRING_APPLICATION_NAME: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-${API_APPLICATION_NAME:-apps-api}
      <<: *shared-spring-env
    networks:
      - app

  postgres-base:
    image: postgres:${POSTGRES_VERSION:-17}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nijigen_video_site}
      POSTGRES_USER: ${POSTGRES_USER:-nijigen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nijigen}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - app
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis-base:
    image: redis:${REDIS_VERSION:-8}
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - app
    restart: unless-stopped
    volumes:
      - redis-data:/data

  flyway-base:
    image: flyway/flyway:${FLYWAY_VERSION:-11}
    command:
      - migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nijigen_video_site}
      FLYWAY_USER: ${POSTGRES_USER:-nijigen}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-nijigen}
      FLYWAY_CONNECT_RETRIES: "60"
      FLYWAY_LOCATIONS: filesystem:/flyway/sql/baseline
    networks:
      - app
    restart: "no"
    volumes:
      - ../flyway/sql/baseline:/flyway/sql/baseline:ro
