# Development Docker Compose configuration

name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}

x-dev-api-service: &dev-api-service
  extends:
    file: common-services.yml
    service: api-base
  build:
    target: jvm-dev
  entrypoint:
    - bash
    - -lc
  volumes:
    - ../../backend:/workspace/backend
    - gradle-cache:/root/.gradle

services:

  api-debug:
    <<: *dev-api-service
    container_name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-api-debug
    profiles:
      - dev-container-debug
    command:
      - ./gradlew --no-daemon :apps:api:installDist && export JAVA_OPTS="-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005" && exec apps/api/build/install/api/api
    ports:
      - ${API_HTTP_PORT:-8080}:8080
      - ${API_DEBUG_PORT:-5005}:5005

  api-jb:
    <<: *dev-api-service
    container_name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-api-jb
    profiles:
      - dev-container-jb
    command:
      - exec sleep infinity
    ports:
      - ${API_HTTP_PORT:-8080}:8080

  postgres:
    extends:
      file: common-services.yml
      service: postgres-base
    ports:
      - ${POSTGRES_HOST_PORT:-5432}:5432

  redis:
    extends:
      file: common-services.yml
      service: redis-base
    ports:
      - ${REDIS_HOST_PORT:-6379}:6379

  flyway:
    extends:
      file: common-services.yml
      service: flyway-base
    environment:
      FLYWAY_LOCATIONS: filesystem:/flyway/sql/baseline,filesystem:/flyway/sql/local
    volumes:
      - ../flyway/sql/baseline:/flyway/sql/baseline:ro
      - ../flyway/sql/local:/flyway/sql/local:ro

networks:
  app:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-app

volumes:
  postgres-data:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-postgres-data
  redis-data:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-redis-data
  gradle-cache:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-gradle-cache
