# Development Docker Compose configuration

name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}

services:

  api-jb:
    extends:
      file: common-services.yml
      service: api-compose-base
    # JB will still build the jar locally, then push to this container.
    # We also checked that the hardened image still has sh and basic JDK tools needed for JB.
    image: ghcr.io/bell-sw/hardened-liberica-runtime-container:jdk-${JDK_VERSION:-25}-glibc
    container_name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-api-jb
    profiles:
      - dev-container-jb
    command:
      - sleep
      - infinity
    ports:
      - ${API_HTTP_PORT:-8080}:8080

  postgres:
    extends:
      file: common-services.yml
      service: postgres-base
    ports:
      - ${POSTGRES_HOST_PORT:-5432}:5432

  redis:
    extends:
      file: common-services.yml
      service: redis-base
    ports:
      - ${REDIS_HOST_PORT:-6379}:6379

  flyway:
    extends:
      file: common-services.yml
      service: flyway-base
    environment:
      FLYWAY_LOCATIONS: filesystem:/flyway/sql/baseline,filesystem:/flyway/sql/local
    volumes:
      - ../flyway/sql/baseline:/flyway/sql/baseline:ro
      - ../flyway/sql/local:/flyway/sql/local:ro

networks:
  app:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-app

volumes:
  postgres-data:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-postgres-data
  redis-data:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-redis-data
