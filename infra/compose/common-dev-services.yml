# Shared development Docker Compose service bases for nijigen-video-site.

# This file exists because services here need the required HOST_UID and HOST_GID environment variables.
# However, these variables are not required by prod. If we put these services back into common-services.yml, prod Docker deployment would need to provide those two env vars, even though prod never uses them.
# Therefore, split common dev services that need HOST_UID and HOST_GID into common-dev-services.yml.

services:
  api-gradle-base:
    extends:
      file: common-services.yml
      service: api-compose-base
    image: ghcr.io/bell-sw/hardened-liberica-native-image-kit-container:jdk-${JDK_VERSION:?JDK_VERSION must be provided, likely from mise.toml}-nik-${JDK_VERSION:?JDK_VERSION must be provided, likely from mise.toml}-glibc
    working_dir: /workspace/backend
    user: "${HOST_UID:?HOST_UID must be provided}:${HOST_GID:?HOST_GID must be provided}"
    environment:
      GRADLE_USER_HOME: /gradle-home
      JDK_VERSION: ${JDK_VERSION:?JDK_VERSION must be provided, likely from mise.toml}
      CI: ${CI:-}
    entrypoint:
      - ./gradlew
      - --no-daemon
    command:
      - :apps:api:bootRun
    restart: "no"
    volumes:
      - ../../backend:/workspace/backend
      - ${HOST_GRADLE_USER_HOME:-${GRADLE_USER_HOME:-${HOME}/.gradle}}:/gradle-home

  web-pnpm-base:
    build:
      context: ../../frontend
      dockerfile: docker/Dockerfile
      target: web-pnpm-base
      args:
        NODE_VERSION: ${NODE_VERSION:?NODE_VERSION must be provided, likely from mise.toml}
        PNPM_VERSION: ${PNPM_VERSION:?PNPM_VERSION must be provided, likely from mise.toml}
    image: ${WEB_PNPM_IMAGE:-nijigen-video-site-web-pnpm:local}
    working_dir: /workspace/frontend
    environment:
      PNPM_CONFIG_STORE_DIR: /pnpm/store
    restart: "no"
