# Task runner Docker Compose configuration

name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}

x-backend-gradle-service: &backend-gradle-service
  image: ghcr.io/bell-sw/hardened-liberica-native-image-kit-container:jdk-${JDK_VERSION:-25}-nik-${JDK_VERSION:-25}-glibc
  working_dir: /workspace/backend
  user: "${HOST_UID:-0}:${HOST_GID:-0}"
  environment:
    - GRADLE_USER_HOME=/gradle-home
    # To pass GitHub Actions `CI` env var. In other hosts without `CI` set, this is simply ignored
    - CI
  entrypoint: ["./gradlew", "--no-daemon"]
  restart: "no"
  volumes:
    - ../../backend:/workspace/backend
    - ${HOST_GRADLE_USER_HOME:-${HOME}/.gradle}:/gradle-home

services:

# This run compose setup. Can be used to run any dev tool command (like gradle tasks, pnpm run) in a controlled environment
# So far not designed for end-to-end testing, that probably better use the prod compose file (or modified version of it)

  api-gradle:
    extends:
      file: common-services.yml
      service: api-compose-base
    <<: *backend-gradle-service

  postgres:
    extends:
      file: common-services.yml
      service: postgres-base

  redis:
    extends:
      file: common-services.yml
      service: redis-base

  flyway:
    extends:
      file: common-services.yml
      service: flyway-base
    environment:
      FLYWAY_LOCATIONS: filesystem:/flyway/sql/baseline,filesystem:/flyway/sql/local
    volumes:
      - ../flyway/sql/baseline:/flyway/sql/baseline:ro
      - ../flyway/sql/local:/flyway/sql/local:ro

networks:
  app:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-app

volumes:
  postgres-data:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-postgres-data
  redis-data:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-redis-data
