# CI and local verification Docker Compose configuration

name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}

services:

  api-jvm-verification:
    extends:
      file: common-services.yml
      service: api-base
    build:
      target: gradle-base
    command:
      - :apps:api:testClasses
    restart: "no"
    volumes:
      - gradle-verify-cache:/root/.gradle

  api-native-verification:
    extends:
      file: common-services.yml
      service: api-base
    build:
      target: gradle-base
    command:
      - :apps:api:nativeTest
    restart: "no"
    volumes:
      - gradle-verify-cache:/root/.gradle

  postgres:
    extends:
      file: common-services.yml
      service: postgres-base

  redis:
    extends:
      file: common-services.yml
      service: redis-base

  flyway:
    extends:
      file: common-services.yml
      service: flyway-base
    environment:
      FLYWAY_LOCATIONS: filesystem:/flyway/sql/baseline,filesystem:/flyway/sql/local
    volumes:
      - ../flyway/sql/baseline:/flyway/sql/baseline:ro
      - ../flyway/sql/local:/flyway/sql/local:ro

networks:
  app:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-app

volumes:
  postgres-data:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-postgres-data
  redis-data:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-redis-data
  gradle-verify-cache:
    name: ${COMPOSE_PROJECT_NAME:-nijigen-video-site}-gradle-verify-cache
