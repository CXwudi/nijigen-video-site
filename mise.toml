# Monorepo task paths are currently an experimental mise feature.
monorepo_root = true

[settings]
experimental = true

[monorepo]
# Automatic mise.toml discovery is deprecated, so config roots are listed explicitly.
config_roots = [
  "backend",
  "backend/docker",
  "frontend",
  "frontend/docker",
  "frontend/web",
  "infra/compose",
]

[env]
JDK_VERSION = "25"
NODE_VERSION = "24"
PNPM_VERSION = "11"

[tools]
# We mostly use floating version unless there is a specific reason to pin the version.

# Backend
java = "{{ env.JDK_VERSION }}"

# Frontend
node = "{{ env.NODE_VERSION }}"
pnpm = "{{ env.PNPM_VERSION }}"

# Others
uv = "latest"
